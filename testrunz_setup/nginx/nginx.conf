upstream server {
    server authapp:7000;
}
 upstream server2 {
    server experimentapp:8000;
 }  

server {
    listen 80;
    
    location /authapp {
        rewrite ^/authapp/(.*) /$1 break; # works for both /server1 and /server1/
        proxy_set_header Host $host;
        proxy_pass http://server;
    }
    location /experimentapp {
        rewrite ^/experimentapp/(.*) /$1 break;
        proxy_set_header Host $host;
        proxy_pass http://server2;
     }
}